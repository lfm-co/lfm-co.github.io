<!DOCTYPE html>
<html>
<head>
    <title>Financial Report</title>
    <style>
        body { font-family: sans-serif; margin: 40px; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        .gemini-box { 
            background: #f9f9f9; 
            padding: 20px; 
            border-left: 5px solid #4285f4; 
            margin-top: 20px; 
        }
    </style>
</head>
<body>
    <a href="index.html">← Back to Home</a>
    
    <h1>Quarterly Financial Analysis</h1>
    
    <!-- This section is generated by styled_df.to_html() -->
    <div class="report-container">
        <table border="1" class="dataframe">
            <thead>
                <tr>
                    <th>Statement Type</th>
                    <th>Metric</th>
                    <th>MCD</th>
                </tr>
            </thead>
            <tbody>
                <!-- Rows will be filled with your heat-map styled data -->
            </tbody>
        </table>
    </div>

    <h2>Gemini Insights</h2>
    <div class="gemini-box">
        <!-- This is where your Gemini analysis text appears -->
        The company shows strong revenue growth this quarter... <br>
        Cash flow remains positive...
    </div>
</body>
</html>
